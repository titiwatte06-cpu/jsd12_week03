<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Blues Shop</title>
</head>
<body>
    <form>
    <table border="2" align="center" style="font-size: 24px; font-family: sans-serif;">
        <thead>
            <tr>
                <th>Camera</th>
                <th>Description</th>
                <th>Picture</th>
                <th>Price</th>
                <th>Quantity</th> <th>Select</th>
            </tr>
        </thead>
        <tbody>
            <tr class="item-row">
                <td>Olympus OM-10</td>
                <td>Vintage Black</td>
                <td><img src="/OM10-1.jpg" width="100" alt="camera"></td>
                <td class="price">3500</td>
                <td><input type="number" class="qty-input" value="1" min="1" style="width: 50px;"></td>
                <td><input type="checkbox" class="price-check"></td>
            </tr>
            </tbody>
        <tfoot>
            <tr>
                <th colspan="3">Total</th>
                <th colspan="3" id="total-display">0</th> </tr>
            <tr>
                <th colspan="6"><button type="submit">Submit</button></th>
            </tr>
        </tfoot>
    </table>
    </form>

    <script>
        const rows = document.querySelectorAll('.item-row');
        const totalDisplay = document.getElementById('total-display');

        function calculateTotal() {
            let grandTotal = 0;
            rows.forEach(row => {
                const checkbox = row.querySelector('.price-check');
                const qtyInput = row.querySelector('.qty-input');
                const price = parseInt(row.querySelector('.price').innerText);

                // ถ้าติ๊กถูก ให้เอา ราคา x จำนวน
                if (checkbox.checked) {
                    grandTotal += (price * parseInt(qtyInput.value));
                }
            });
            totalDisplay.innerText = grandTotal;
        }

        // ฟังเหตุการณ์ทั้งการ 'คลิกติ๊กถูก' และ 'เปลี่ยนตัวเลขจำนวน'
        document.querySelectorAll('.price-check, .qty-input').forEach(input => {
            input.addEventListener('change', calculateTotal);
            input.addEventListener('input', calculateTotal); // สำหรับการพิมพ์ตัวเลข
        });
    </script>
</body>
</html>
